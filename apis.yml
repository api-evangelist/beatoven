aid: beatoven
name: Beatoven.ai
url: https://raw.githubusercontent.com/api-evangelist/beatoven/refs/heads/main/apis.yml
description: >-
  Beatoven.ai is an Indian generative-music startup (Bengaluru, founded 2021) building text-to-music and
  text-to-sound-effects models for video creators, podcasters, game developers, and brands. Its Maestro Music and
  Maestro SFX models render royalty-free background tracks and foley from natural-language prompts, with downloads
  delivered as mp3, aac, or wav plus separately rendered stems (bass, chords, melody, percussion). Beatoven is Fairly
  Trained certified - musicians whose work appears in the training corpus receive equitable compensation. The company
  exposes a public REST Composition API (public-api.beatoven.ai) plus an open-source Python SDK
  (github.com/Beatoven/public-api), a Make.com integration, and a self-serve API dashboard. The company has raised an
  ~$1.3M pre-Series A led by Capital 2B and IvyCap Ventures, claims 2M+ creators and 15M+ tracks generated, and reports
  96% of its revenue from international markets.
