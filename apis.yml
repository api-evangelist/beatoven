apis:
  - aid: beatoven:beatoven-composition-api
    name: Beatoven Composition API
    description: >-
      Asynchronous REST API for composing tracks from natural-language prompts. POST a prompt to /api/v1/tracks/compose
      to receive a task_id, then poll GET /api/v1/tasks/{task_id} until status is "composed". The completed response
      includes a download URL for the master mix and separate URLs for the bass, chords, melody, and percussion stems.
      Supports mp3, aac, and wav output and an optional looping flag for loopable structure. Authentication is HTTP
      Bearer with an API key issued via sync.beatoven.ai/apiDashboard or by emailing hello@beatoven.ai.
    humanURL: https://github.com/Beatoven/public-api/blob/main/docs/api-spec.md
    baseURL: https://public-api.beatoven.ai
